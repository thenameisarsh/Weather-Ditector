<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Weather</title>
  <link rel="icon" type="image/png" href="clear.png">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>


<body>
  <main class="main-container">
    <header class="input-container">
      <input class="city-input" placeholder="Search City">
      <button class="search-btn">
        <span class="material-symbols-outlined">
          search
        </span>
      </button>
    </header>
    <section class="weather-info" style="display:none;">
      <div class="location-date-container">
        <div class="location">
          <span class="material-symbols-outlined">
            location_on
          </span>
          <h4 class="country-txt">waidhan</h4>
        </div>
        <h5 class="current-date-txt regular-txt">wed, 21 Sep<h5>
      </div>

      <div class="weather-summary-container">
        <img src="Weather-few-clouds.svg.png" class="weather-summary-img">
        <div class="weather-summary-info">
          <h1 class="temp-txt">29°C</h1>
          <h3 class="condition-txt regular-txt">Clouds</h3>
        </div>
      </div>
      <div class="weather-condition-container">
        <div class="condition-item">
          <span class="material-symbols-outlined">
            water_drop
          </span>
          <div class="condition-info">
            <h5 class="regular-txt">Humidity</h5>
            <h5 class="humidity-value-txt">55%</h5>
          </div>
        </div>
        <div class="condition-item">
          <span class="material-symbols-outlined">
            air
          </span>
          <div class="condition-info">
            <h5 class="regular-txt">Wind Speed</h5>
            <h5 class="wind-value-txt">2 M / s</h5>
          </div>
        </div>
      </div>
      <div class="forcast-item-container">
        <div class="forcast-item">
          <h5 class="forecast-item-date regular-txt">05 Aug</h5>
          <img src="Weather-rain-thunderstorm.svg.png" class="forecast-item-img">
          <h5 class="forecast-item-temp">29°C</h5>
        </div>
        <div class="forcast-item">
          <h5 class="forecast-item-date regular-txt">05 Aug</h5>
          <img src="Weather-rain-thunderstorm.svg.png" class="forecast-item-img">
          <h5 class="forecast-item-temp">29°C</h5>
        </div>
        <div class="forcast-item">
          <h5 class="forecast-item-date regular-txt">05 Aug</h5>
          <img src="Weather-rain-thunderstorm.svg.png" class="forecast-item-img">
          <h5 class="forecast-item-temp">29°C</h5>
        </div>
        <div class="forcast-item">
          <h5 class="forecast-item-date regular-txt">05 Aug</h5>
          <img src="Weather-rain-thunderstorm.svg.png" class="forecast-item-img">
          <h5 class="forecast-item-temp">29°C</h5>
        </div>
      </div>
    </section>

    <section class="search-city section-message">
      <img src="4652346.png" alt="">
      <div>
        <h1>Search City</h1>
        <h4 class="regular-txt">
          Find out the weather condition of the city
        </h4>
      </div>
    </section>

    <section class="not-found section-message" style="display: none;">
      <img class="message-img" src="404-error-design-with-angry-cloud_23-2147733485.jpg" alt="">
      <div>
        <h1>Search City</h1>
        <h4 class="regular-txt">
          Find out the weather condition of the city
        </h4>
      </div>
    </section>


  </main>
</body>

</html>
